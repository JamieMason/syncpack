name: Set up Node
description: Install Node.js 24 and update npm to latest

runs:
  using: composite
  steps:
    - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version: 24
        registry-url: "https://registry.npmjs.org"
    - shell: bash
      run: npm install -g npm@latest
